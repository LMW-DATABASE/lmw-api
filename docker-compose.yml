# docker-compose.yml

version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: lmw_postgres_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ./.env
  backend:
    build: .
    container_name: lmw_django_api
    volumes:
      - .:/app
    ports:
      - "${DJANGO_PORT:-8000}:8000"
    env_file:
      - ./.env
    depends_on:
      - db
    command: >
      sh -c "python manage.py migrate && 
             python manage.py runserver 0.0.0.0:8000"

volumes:
  postgres_data: